spring:
  autoconfigure:
    # PgVectorStoreAutoConfiguration requires an EmbeddingModel bean wired its way.
    # We build our own Voyage-backed EmbeddingModel in EmbeddingConfig and persist
    # via JPA — exclude the auto-config to avoid conflicts.
    # OpenAI auto-config not needed: we use spring-ai-openai (core), not the starter.
    exclude:
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

  datasource:
    url: jdbc:postgresql://localhost:5432/gtmzero
    username: gtmzero
    password: gtmzero
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema — Hibernate must not touch DDL
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-6
          temperature: 0.2          # factual, not creative — citations must be stable
          max-tokens: 600           # caps answer length, prevents demo-time runaway
    vectorstore:
      pgvector:
        initialize-schema: false   # Flyway owns this too
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024           # voyage-3-large output dimension

logging:
  level:
    com.gtmzero.service: DEBUG
    org.springframework.ai: INFO
