spring:
  autoconfigure:
    # PgVectorStoreAutoConfiguration requires an EmbeddingModel bean.
    # Voyage AI wiring happens in Part 2 — exclude until then.
    exclude: org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

  datasource:
    url: jdbc:postgresql://localhost:5432/gtmzero
    username: gtmzero
    password: gtmzero
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema — Hibernate must not touch DDL
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 8192
    vectorstore:
      pgvector:
        initialize-schema: false   # Flyway owns this too
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024           # voyage-3-large output dimension
